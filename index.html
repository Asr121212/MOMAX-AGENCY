<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOMAX | موماكس</title>
    <meta name="description" content="متجر موماكس الرسمي - أفضل الإكسسوارات الإلكترونية بجودة عالية وأسعار مميزة">
    <meta name="theme-color" content="#7C3AED">
    <meta name="color-scheme" content="light dark">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-light">

    <div id="globalLoader" class="global-loader">
        <div class="cube-wrapper">
            <div class="cube">
                <div class="cube-face face-front">MOMAX</div>
                <div class="cube-face face-back">موماكس</div>
                <div class="cube-face face-top">3D</div>
                <div class="cube-face face-bottom">QUALITY</div>
                <div class="cube-face face-left">MAX</div>
                <div class="cube-face face-right">STORE</div>
            </div>
        </div>
    </div>

    <header class="main-header">
        <div class="header-container container">
            <div class="brand-identity">
                <!-- صورة الأيقونة -->
                <img src="images/logo.webp" alt="MOMAX Icon" class="brand-logo-icon">
                <!-- صورة النص -->
                <img src="images/momax-title.webp" alt="MOMAX Title" class="brand-logo-text">
            </div>
            
            <div class="header-actions">
                <button id="themeToggle" class="action-circle-btn" aria-label="تبديل الوضع">🌙</button>
                <button id="desktopCartTrigger" class="desktop-cart-btn">
                    <span class="cart-icon">🛒</span>
                    <span class="cart-counter-badge total-cart-count">0</span>
                </button>
            </div>
        </div>
        
        <div class="search-section container">
            <div class="search-wrapper">
                <span class="search-inside-icon">🔍</span>
                <input type="text" id="productSearchInput" placeholder="ابحث باسم المنتج أو رقم الـ ID الخاص به...">
                <button id="clearSearchBtn" class="clear-search-btn hidden">✕</button>
            </div>
        </div>

        <div class="categories-navigation">
            <div class="categories-scroll-box container" id="categoriesChipsWrapper">
                </div>
        </div>
    </header>

    <main class="main-storefront container">
        <div class="products-3d-grid" id="productsDynamicGrid">
            </div>
        
        <div id="searchEmptyState" class="empty-state-view hidden">
            <div class="empty-box-3d">📦</div>
            <h3>عذراً، لم نجد ما تبحث عنه!</h3>
            <p>تأكد من كتابة اسم المنتج بشكل صحيح أو التحقق من رقم ال ID.</p>
        </div>
    </main>

    <div id="sheetDimOverlay" class="sheet-dim-overlay hidden"></div>
    <div id="productDetailsSheet" class="product-bottom-sheet hidden">
        <div class="sheet-drag-handle-bar">
            <div class="drag-line"></div>
            <button id="closeSheetCross" class="sheet-close-cross">✕</button>
        </div>
        <div class="sheet-scrollable-body" id="productSheetInteractiveContent">
            </div>
    </div>

    <div id="cartDrawerDimOverlay" class="sheet-dim-overlay hidden"></div>
    <div id="shoppingCartDrawer" class="shopping-cart-drawer hidden">
        <div class="drawer-header-section">
            <h2>سلة التسوق الذكية</h2>
            <button id="closeCartDrawerBtn" class="sheet-close-cross">✕</button>
        </div>
        <div class="drawer-items-list" id="cartDrawerItemsContainer">
            </div>
        <div class="drawer-footer-checkout">
            <div class="checkout-summary-row">
                <span>إجمالي الطلب:</span>
                <span id="cartTotalPriceSum" class="total-price-highlight">0 ر.ي</span>
            </div>
            <div class="checkout-buttons-group">
                <button id="clearEntireCartBtn" class="btn-secondary-action">إفراغ السلة</button>
                <button id="sendOrderToWhatsappBtn" class="btn-primary-whatsapp">إرسال الطلب عبر واتساب 💬</button>
            </div>
        </div>
    </div>

    <nav class="mobile-sticky-navigation">
        <button class="mobile-nav-link active" onclick="window.scrollTo({top:0, behavior:'smooth'})">
            <span class="nav-btn-icon">🏠</span>
            <span class="nav-btn-text">الرئيسية</span>
        </button>
        <button class="mobile-nav-link" id="mobileSearchFocusTrigger">
            <span class="nav-btn-icon">🔍</span>
            <span class="nav-btn-text">بحث</span>
        </button>
        <button class="mobile-nav-link" id="mobileCartTrigger">
            <div class="nav-btn-icon-wrapper">
                <span class="nav-btn-icon">🛒</span>
                <span class="cart-counter-badge total-cart-count mobile-badge">0</span>
            </div>
            <span class="nav-btn-text">السلة</span>
        </button>
        <button class="mobile-nav-link" id="mobileDirectWhatsappLink">
            <span class="nav-btn-icon">💬</span>
            <span class="nav-btn-text">واتساب</span>
        </button>
    </nav>

    <button id="scrollToTopFloatingBtn" class="scroll-to-top-btn hidden" aria-label="العودة لأعلى الشاشة">⬆️</button>

    <footer class="modern-footer">
        <div class="container footer-layout">
            <p class="footer-copyright">جميع الحقوق محفوظة © 2026 لموقع <span class="brand-accent-text">MOMAX</span>. اطلب موماكس، تلقى الجودة ماكس.</p>
        </div>
    </footer>

    <script src="products.js"></script>
    <script src="app.js"></script>
</body>
</html>
