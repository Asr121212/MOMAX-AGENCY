<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOMAX | موماكس</title>
    <meta name="description" content="أفضل الإكسسوارات الإلكترونية بجودة عالية وأسعار مميزة">
    <meta name="theme-color" content="#ffffff">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-top container">
            <div class="logo-area">
                <img src="images/logo.png" alt="MOMAX Logo" class="logo" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCI+PHJlY3Qgd2lkdGg9IjUwIiBoZWlnaHQ9IjUwIiBmaWxsPSIjZWVlIi8+PC9zdmc+'">
                <h1 class="brand-name">موماكس</h1>
            </div>
            <div class="desktop-actions">
                <button id="themeToggleBtn" class="icon-btn" aria-label="Toggle Theme">🌙</button>
                <button id="desktopCartBtn" class="cart-btn" aria-label="Open Cart">
                    🛒 <span class="cart-badge">0</span>
                </button>
            </div>
        </div>
        
        <div class="search-container container">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="ابحث بالاسم أو برقم المنتج (ID)..." aria-label="Search products">
            </div>
        </div>

        <div class="categories-wrapper">
            <div class="categories-scroll container" id="categoriesContainer">
                </div>
        </div>
    </header>

    <main class="main-content container">
        <div class="product-grid" id="productGrid">
            </div>
        
        <div id="noResults" class="no-results hidden">
            <span class="no-results-icon">📦</span>
            <h3>لم يتم العثور على منتجات</h3>
            <p>جرب البحث بكلمات مختلفة أو تحقق من رقم المنتج.</p>
        </div>
    </main>

    <div id="productSheetOverlay" class="overlay hidden"></div>
    <div id="productSheet" class="bottom-sheet hidden">
        <div class="sheet-header">
            <div class="sheet-handle"></div>
            <button id="closeSheetBtn" class="close-btn" aria-label="Close">✕</button>
        </div>
        <div class="sheet-content" id="sheetContent">
            </div>
    </div>

    <div id="cartDrawerOverlay" class="overlay hidden"></div>
    <div id="cartDrawer" class="cart-drawer hidden">
        <div class="cart-header">
            <h2>سلة المشتريات</h2>
            <button id="closeCartBtn" class="close-btn" aria-label="Close Cart">✕</button>
        </div>
        <div class="cart-items" id="cartItemsContainer">
            </div>
        <div class="cart-footer">
            <div class="cart-summary">
                <span>الإجمالي:</span>
                <strong class="total-price" id="cartTotal">0 ر.ي</strong>
            </div>
            <div class="cart-actions">
                <button id="clearCartBtn" class="btn btn-outline">إفراغ السلة</button>
                <button id="whatsappCheckoutBtn" class="btn btn-primary">إرسال الطلب عبر واتساب 💬</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="window.scrollTo(0,0)">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">الرئيسية</span>
        </button>
        <button class="nav-item" id="mobileSearchBtn">
            <span class="nav-icon">🔍</span>
            <span class="nav-text">بحث</span>
        </button>
        <button class="nav-item" id="mobileCartBtn">
            <div class="nav-icon-wrapper">
                <span class="nav-icon">🛒</span>
                <span class="cart-badge mobile-badge">0</span>
            </div>
            <span class="nav-text">السلة</span>
        </button>
        <button class="nav-item" id="mobileWhatsappBtn">
            <span class="nav-icon">💬</span>
            <span class="nav-text">واتساب</span>
        </button>
    </nav>

    <button id="backToTopBtn" class="back-to-top hidden" aria-label="Back to Top">⬆️</button>

    <footer class="footer">
        <div class="container">
            <p>موماكس © 2026. الجودة ماكس.</p>
        </div>
    </footer>

    <script src="products.js"></script>
    <script src="app.js"></script>
</body>
</html>
